body:
  text: 原本周易本義卷十宋朱熹撰周易説卦傳昔者聖人之作易也幽贊於神明而生蓍幽贊神明猶言贊化育龜筴傳曰天下和平王道得而蓍莖長丈其叢生滿百莖參天兩地而倚數天圓地方圓者一而圍三三各一竒故參天而為三方者一而圍四四合二耦故兩地而合二數皆􅀝此而起故揲蓍三變之末其餘三竒則三三而九三耦則三二而六兩二一三則為七兩三一二則為八觀變於隂陽而立卦發揮於剛柔而生爻和順於道德而理於義窮理盡性以至於命和順從容無所乖逆統言之也理謂隨事得其條理析言之也窮天下之理盡人物之性而合於天道此聖人作易之極功也此第一章昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三材而兩之故易六畫而成卦分隂分陽迭用柔剛故易六位而成章兼三才而两之總言六畫又細分之則隂陽之位間雜而成文章也此第二章天地定位山澤通氣雷風相薄水火不相射八卦相錯邵子曰此伏羲八卦之位乾南坤北離東坎西兌居東南震居東北巽居西南艮居西北於是八卦相交而成六十四卦所謂先天之學也數徃者順知來者逆是故易逆數也起震而歴離兊以至於乾數已生之卦也自巽而歴坎艮以至於坤推未生之卦也易之生卦則以乾兑離震巽坎艮坤為次故皆逆數也此第三章雷以動之風以㪚之雨以潤之日以烜之艮以止之兊以説之乾以君之坤以藏之此卦位相對與上章同此第四章帝出乎震齊乎巽相見乎離致役乎坤説言乎兊戰乎乾勞乎坎成言乎艮帝者天之主宰邵子曰此卦位乃文王所定所謂後天之學也萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之㓗齊也離也者明也萬物皆相見南方之卦也聖人南靣而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兊正秋也萬物之所說也故曰説言乎兊戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮上言帝此言萬物之隨帝以出入也此第五章所推卦位之説多未詳者神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火説萬物者莫説乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也此去乾坤而專言六子以見神之所為然其位序亦用上章之説未詳其義此第六章乾健也坤順也震動也巽入也坎陷也離麗也艮止也兊説也此言八卦之性情此第七章乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兑為羊逺取諸物如此此第八章乾為首坤為腹震為足巽為股坎為耳離為目艮為手兊為口近取諸身如此此第九章乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女索求也謂揲蓍以求爻也男女指卦中一隂一陽之爻而言此第十章乾為天為圜為君為父為玉為金為寒為氷為大赤為良馬為老馬為瘠馬為駁馬為木果荀九家此下有為龍為直為衣為言坤為地為母為布為釡為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黒荀九家有為牝為迷為方為囊為裳為黄為帛為漿震為雷為龍為𤣥黄為旉為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮荀九家冇為玉為鵠為鼔巽為木為風為長女為繩直為工為白為長為高為進退為不果為臭其於人也為寡髪為廣顙為多白眼為近利市三倍其究為躁卦荀九家有為楊為鸛坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美瘠為亟心為下首為薄蹄為曵其於輿也為多𤯝為通為月為盗其於木也為堅多心荀九家有為宫為律為可為棟為叢棘為狐為蒺藜為桎梏離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鼈為蟹為蠃為蚌為龜其於木也為科上槁荀九家有為牝牛艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為䑕為黔啄之屬其於木也為堅多節荀九家有為鼻為虎為狐兊為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊荀九家有為常為輔頰求此第十一章廣八卦之𧰼其間多不可曉者之於經亦不盡合也原本周易本義卷十
