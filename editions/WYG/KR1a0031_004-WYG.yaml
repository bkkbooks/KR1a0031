body:
  text: 原本周易本義卷四宋朱熹撰周易􅂏下傳咸感也釋卦名義柔上而剛下二氣感應以相與止而説男下女是以亨利貞取女吉也以卦體卦德卦𧰼釋卦辭或以卦變言柔上剛下之義曰咸自旅來柔上居六剛下居五也亦通天地感而萬物化生聖人感人心而天下和平觀其所感而天地萬物之情可見矣極言感通之理恒久也剛上而柔下雷風相與巽而動剛柔皆應恒以卦體卦德卦德釋卦名義或以卦變言剛上柔下之義曰恒自豐來剛上居二柔下居􅀄也亦通恒亨无咎利貞久於其道也天地之道恒久而不已也恒固能亨且無咎矣然必利於正乃為久於其道不正則久非其道矣天地之道所以長久亦以正而巳矣利有攸徃終則有始也久於其道終也利有攸徃始也動静相生循環之理然必静為主也日月得天而能久照四時變化而能久成聖人久於其道而天下化成觀其所恒而天地萬物之情可見矣極言恒久之道遯亨遯而亨也剛當位而應與時行也以九五一爻釋亨義小利貞浸而長也以下二隂釋小利貞遯之時義大矣哉隂力浸長處之為難故其時義為尤大大壯大者壯也剛以動故壯釋卦名義以卦體言則陽長過中大者壯也以卦德言則乾剛震動所以壯也大壯利貞大者正也正大而天地之情可見矣釋利貞之義而極言之晉進也釋卦名義明出地上順而麗乎大明柔進而上行是以康侯用錫馬蕃庶晝日三接也以卦𧰼卦德卦變釋卦辭明入地中明夷以卦象釋卦名内文明而外柔順以蒙大難文王以之以卦德釋卦義蒙大難謂遭紂之亂而見囚也利艱貞晦其明也内難而能正其志箕子以之以六五一爻之義釋卦辭内難謂為紂近親在其國内如六五之近於上六也家人女正位乎内男正位乎外男女正天地之大義也以卦體九五六二釋利女貞之義家人有嚴君焉父母之謂也亦謂二五父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣上父􅀄子五三夫四二婦五兄三弟以卦畫推之又有此象睽火動而上澤動而下二女同居其志不同行以卦𧰼釋卦名義説而麗乎明柔進而上行得中而應乎剛是以小事吉以卦德卦變卦體釋卦辭天地睽而其事同也男女睽而其志通也萬物睽而其事𩔖也睽之時用大矣哉極言其理而贊之蹇難也險在前也見險而能止知矣哉以卦德釋卦名義而贊其美蹇利西南徃得中也不利東北其道窮也利見大人徃有功也當位貞吉以正邦也蹇之時用大矣哉以卦變卦體釋卦辭而贊其時用之大也解險以動動而免乎險解以卦徳釋卦名義解利西南徃得衆也其來復吉乃得中也有攸徃夙吉徃有功也以卦變釋卦辭坤為衆得衆謂九四入坤體得中有功皆指九二天地解而雷雨作雷雨作而百果草木皆甲坼解之時大矣哉極言而贊其大也損損下益上其道上行以卦體釋卦名義損而有孚元吉无咎可貞利有攸徃曷之用二簋可用享二簋應有時損剛益柔有時損益盈虛與時偕行此釋卦辭時謂當損之時益損上益下民説无疆自上下下其道大光以卦體釋卦名義利有攸徃中正有慶利渉大川木道乃行以卦體卦𧰼釋卦辭益動而巽日進无疆天施地生其益无方凡益之道與時偕行動巽二卦之徳乾下施坤上生亦上文卦體之義又以此極言贊益之大夬决也剛决柔也健而説决而和釋卦名義而贊其徳揚于王庭柔乗五剛也孚號有厲其危乃光也告自邑不利即戎所尚乃窮也利有攸徃剛長乃終也此釋卦辭柔乗五剛以卦體言謂以一小人加于衆君子之上是其罪也剛長乃終謂一變即為純乾姤遇也柔遇剛也釋卦名勿用取女不可與長也釋卦辭天地相遇品物咸章也以卦體言剛遇中正天下大行也指九五姤姤之時義大矣哉幾㣲之際聖人所謹萃聚也順以説剛中而應故聚也以卦德卦體釋卦名義王假有廟致孝享也利見大人亨聚以正也用大牲吉利有攸徃順天命也釋卦辭觀其所聚而天地萬物之情可見矣柔以時升以卦變釋卦名巽而順剛中而應是以大亨以卦德卦體釋卦辭用見大人勿恤有慶也南征吉志行也困剛揜也以卦體釋卦名險以説困而不失其所亨其唯君子乎貞大人吉以剛中也有言不信尚口乃窮也以卦德卦體釋卦辭巽乎水而上水井井養而不窮也以卦象釋卦名義改邑不改井乃以剛中也汔至亦未繘井未有功也羸其缾是以凶也以卦體釋卦辭无喪无得徃來井井两句意與不改井同故不復出剛中以二五而言未有功而敗其缾所以凶也革水火相息二女同居其志不相得曰革以卦象釋卦名義大畧與暌相似然以相違而為暌相息而為革也息滅息也又為生息之義滅息而後生息也已日乃孚革而信之文明以説大亨以正革而當其悔乃亡以卦徳釋卦辭天地革而四時成湯武革命順乎天而應乎人革之時大矣哉極言而贊其大鼎象也以木巽火亨飪也聖人亨以享上帝而大亨以養聖賢以卦體二象釋卦名義因極其大而言之享帝貴誠用犢而已養賢則饔飱牢禮當極其盛故曰大亨巽而耳目聰明柔進而上行得中而應乎剛是以元亨以卦象卦變卦體釋卦辭震亨震有亨道不待言也震雷虩虩恐致福也笑言啞啞後有則也恐致福恐懼以致福也則法也震驚百里驚逺而懼邇也出可以守宗廟社稷以為祭主也程子以為邇也下脱不喪匕鬯四字今從之出謂繼世而主祭也或云出即鬯字之誤艮止也時止則止時行則行動靜不失其時其道光明此懌卦名艮之義則止也然行止各有其時故時止而止止也時行而行亦止也艮體篤實故又有光明之義大畜於艮亦以輝光言之艮其止止其所也上下敵應不相與也是以不獲其身行其庭不見其人无咎也此釋卦體易背為止以明背即止也背者止之所也以卦體言内外之卦隂陽敵應而不相與也不相與則内不見巳外不見人而无咎矣晁氏云艮其止當依卦辭作背漸之進也女歸吉也之字疑衍或是漸字進得位徃有功也進以正可以正邦也以卦變釋利貞之意蓋此卦之變自涣而來九進居三自旅而来九進居五皆為得位之正其位剛得中也以卦體言謂九五止而巽動不窮也以卦德言漸進之義歸妹天地之大義也天地不交而萬物不興歸妹人之終始也釋卦名義也歸者女之終生育者人之始説以動所歸妹也又以卦徳言之征凶位不當也无攸利柔乗剛也又以卦體釋卦辭男女之交本皆正理惟若此卦則不得其正也豐大也明以動故豐以卦德釋卦名義王假之尚大也勿憂冝日中冝照天下也釋卦辭日中則昊月盈則食天地盈虛與時消息而况於人乎况於鬼神乎此又發明卦辭外意言不可過中也旅小亨柔得中乎外而順乎剛止而麗乎明是以小亨旅貞吉也以卦體卦德釋卦辭旅之時義大矣哉旅之時為難處重巽以申命釋卦義也巽順而入必究乎下命令之象重巽故為申命也剛巽乎中正而志行柔皆順乎剛是以小亨利有攸徃利見大人以卦體釋卦辭剛巽乎中正而志行指九五柔謂初四兑説也釋卦名義剛中而柔外説以利貞是以順乎天而應乎人説以先民民忘其勞説以犯難民忘其死説之大民勸矣哉以卦體釋卦辭而極言之渙亨剛來而不窮柔得位乎外而上同以卦變釋卦辭王假有廟王乃在中也中謂廟中利渉大川乗木有功也節亨剛柔分而剛得中以卦體釋卦辭苦節不可貞其道窮也又以理言説以行險當位以節中正以通又以卦徳卦體言之當位中正指五又坎為通天地節而四時成節以制度不傷財不害民極言節道中孚柔在内而剛得中説而巽孚乃化邦也以卦體卦德釋卦名義豚魚吉信及豚魚也利渉大川乗木舟虛也以卦象言中孚以利貞乃應乎天也信而正則應乎天矣小過小者過而亨也以卦體釋卦名義與其辭過以利貞與時行也柔得中是以小事吉也以二五言剛失位而不中是以不可大事也以三四言有飛鳥之象焉飛鳥遺之音不冝上冝下大吉上逆而下順也以卦體言既濟亨小者亨也濟下疑脫小字利貞剛柔正而位當也以卦體言初吉柔得中也指六二終止則亂其道窮也未濟亨柔得中也指九五言小狐汔濟未出中也濡其尾无攸利不續終也雖不當位剛柔應也原本周易本義卷四
