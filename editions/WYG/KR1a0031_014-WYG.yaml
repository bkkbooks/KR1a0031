body:
  text: 原本周易本義卷末下宋朱熹撰筮儀擇地㓗處為蓍室南戸置牀于室中央牀大約長五尺廣三尺毋太近壁蓍五十莖韜以纁帛貯以皂囊納之櫝中置于牀北櫝以竹筒或堅木或布漆為之圓徑三寸如蓍之長半為底半為蓋下别為臺函之使不偃仆設木格于櫝南居牀二分之北格以横木版為之高一尺長竟牀當中為两大刻相距一尺大刻之西為三小刻相距各五寸許下施横足側立案上置香爐一于格南香合一于爐南日炷香致敬將筮則洒掃拂拭滌研一注水及筆一墨一黄漆版一于爐東東上筮者齋㓗衣冠北向盥手焚香致敬筮者北向見儀禮若使人筮則主人焚香畢少退北向立筮者進立於牀前少西南向受命主人直述所占之事筮者許諾主人右還西向立筮者右還北向立两手奉櫝蓋置于格南爐北出蓍于櫝去囊解韜置于櫝東合五十䇿两手執之熏于爐上此後所用蓍䇿之數其説並見啟䝉命之曰假爾泰筮有常假爾泰筮有常某官姓名今以某事云云未知可否爰質所疑于神于靈吉凶得失悔吝憂虞惟爾有神尚明告之乃以右手取其一䇿反于櫝中而以左右手中分四中九䇿置格之左右两大刻此第一營所謂分而為二以象两者也次以左手取左大刻之䇿執之而以右手取右大刻之䇿掛於左手之小指間此第二營所謂掛一以𧰼三者也次以右手四揲左手之䇿此第三營之半所謂揲之以四以𧰼四時者也次歸其所餘之䇿或一或二或三或四而扐之左手無名指間此第四營之半所謂歸竒于扐以象閏者也次以右手反過揲之䇿於左大刻遂取右大刻之䇿執之而以左手四揲之此第三營之半次歸其所餘之䇿如前而扐之左手中指之間此第四營之半所謂再扐以象再閏者也一變所餘之䇿左一則右必三左二則右亦二左三則右必一左四則右亦四通掛一之䇿不五則九五以一其四而為竒九以两其四而為偶竒者三而偶者一也次以右手反過揲之䇿於右大刻而合左手一掛二扐之䇿置于格上第一小刻以東為上後放此是為一變再以两手取左右大刻之蓍合之或四十四䇿或四十䇿復四營如第一變之儀而置其掛扐之䇿於格上第二小刻是為二變二變所餘之䇿左一則右必二左二則右必一左三則右必四左四則右必三通掛一之䇿不四則八四以一其四而為竒八以两其四而為偶竒偶各得四之二焉又再取左右大刻之蓍合之或四十䇿或三十六䇿或三十二䇿復四營如第二變之儀而置其掛扐之䇿於格上第三小刻是為三變三變餘䇿與二變同三變既畢乃視其三變所得掛扐過揲之䇿而畫其爻於版掛扐之數五四為竒八九為偶掛扐三竒合十三䇿則過揲三十六䇿而為老陽其畫為口所謂重也掛扐两竒一偶合十七䇿則過揲三十二䇿而為少隂其畫為一所謂拆也掛扐两偶一竒合二十一䇿則過揲二十八䇿所謂少陽其畵為一所謂單也掛扐三偶合二十五䇿則過揲二十四䇿而為老隂其畫為乂所謂交也如是毎三變而成爻第一第四第七第十第十三第十六凡六變並同但第二變以下不命而但用四十九蓍耳第二第五第八第十一第十四第十七凡六變亦同第三第六第九第十二第十五第十八凡六變亦同凡十有八變而成卦乃考其卦之變而占其事之吉凶卦變别有圖説見啟䝉禮畢韜蓍襲之以囊入櫝加蓋斂筆研墨版再焚香致敬而退如使人筮則主人焚香揖筮者而退原本周易本義卷末下
