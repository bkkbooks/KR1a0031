body:
  text: 原本周易本義卷十二宋朱熹撰周易雜卦傳乾剛坤柔比樂師憂臨觀之義或與或求以我臨物曰與物來觀我曰求或曰二卦互有與求之義屯見而不失其居䝉雜而著屯震遇坎震動故見坎險不行也蒙坎遇艮坎憂昧艮光明也或曰屯以𥘉言蒙以二言震起也艮止也損益盛衰之始也大畜時也無妄災也止健者時有適然無妄而災自外至萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也白受采兊見而巽伏也兊隂外見巽隂內著隨無故也蠱則飭也隨前無故蠱後當飭剝爛也復反也晉晝也明夷誅也誅傷也井通而困相遇也剛柔相遇而剛見掩也咸速也恆久也感速常久渙離也節止也解緩也蹇難也睽外也家人內也否泰反其類也大壯則止遁者退也止謂不退大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也既明且衆其故多矣離上而坎下也火炎上水潤下小畜寡也履不處也不處行進之義需不進也訟不親也大過顛也遘遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也自遘以下卦不反對或疑其錯簡今以韻協之又似非誤未詳何義原本周易本義卷十二
