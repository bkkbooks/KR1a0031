  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0031_WYG_005-1a, image: WYG0012/WYG0012-0671a.png}
body:
  text: 原本周易本義卷五宋朱熹撰周易象上傳象者卦之上下兩象及兩象之六爻周公所繫之辭也天行健君子以自強不息天乾卦之象也凡重卦皆取重義此獨不然者天一而已但言天行則見其一日一周而明日又一周若重復之象非至健不能也君子法之不以人欲害其天德之剛則自強而不息矣濳龍勿用陽在下也見龍在田德施普也終日乾乾反復道也反復重復踐行之意或躍在淵進無咎也可以進而不必進也飛龍在天大人造也造猶作也亢龍有悔盈不可久也用九天德不可為首也言陽剛不可為物先故六陽皆變而吉天行以下先儒謂之大象潛龍以下先儒謂之小象後放此地𫝑坤君子以厚德載物地坤之象亦一而巳故不言重而言其𫝑之順則見其高下相因之無窮至順極厚而無所不載也履霜堅氷隂始凝也馴致其道至堅氷也按魏志作初六履霜今當從之馴順習也六二之動直以方也不習無不利地道光也含章可貞以時發也或從王事知光大也括囊無咎慎不害也黃裳元吉文在中也文在中而見於外也龍戰於野其道窮也用六永貞以大終也初隂後陽故曰大終雲雷屯君子以經綸坎不言水而言雲者未通之意經綸治絲之事經引之綸理之也屯難之世君子有為之時也雖盤桓志行正也以貴下賤大得民也六二之難乘剛也十年乃字反常也即鹿無虞以從禽也君子舍之往吝窮也求而往明也屯其膏施未光也泣血漣如何可長也山下出泉蒙君子以果行育德泉水之始出者必行而有漸也利用刑人以正法也發蒙之初法不可不正懲戒所以正法也子克家剛柔接也指二五之應勿用取女行不順也困蒙之吝獨逺實也順當作慎蓋順慎古字通用荀子順墨作慎墨且行不慎於經患尤親切實協韻去聲童蒙之吉順以巽也利用禦寇上下順也禦冦以剛上下皆得其道雲上於天需君子以飲食宴樂雲上於天無所復為待其隂陽之和而自雨耳事之當需者亦不容更有所為但飲食宴樂俟其自至而已一有所為則非需也需于郊不犯難行也利用恆無咎未失常也需于沙衍在中也雖小有言以吉終也衍寬意以寬居中不急進也需于泥災在外也自我致寇敬慎不敗也外謂外卦敬慎不敗發明占外之占聖人示人之意切矣需于血順以聽也酒食貞吉以中正也不速之客來敬之終吉雖不當位未大失也以隂居上是為當位言不當位未詳天與水違行訟君子以作事謀始天上水下其行相違作事謀始訟端絶矣不永所事訟不可長也雖小有言其辨明也不克訟歸逋竄也自下訟上患至掇也掇自取也食舊德從上吉也從上吉謂隨人則吉明自主事則無成功也復即命渝安貞不失也訟元吉以中正也中則聽不偏正則斷合理以訟受服亦不足敬也地中有水師君子以容民畜衆水不外於地兵不外於民故能養民則可以得衆矣師出以律失律凶也在師中吉承天寵也王三錫命懷萬邦也師或輿尸大無功也左次無咎未失常也知難而退師之常也長子帥師以中行也弟子輿尸使不當也大君有命以正功也小人勿用必亂邦也聖人之戒深矣地上有水比先王以建萬國親諸侯地上有水水比於地不容有間建國親諸侯亦先王所以比於天下而無間者也彖意人來比我此取我往比人比之初六有它吉也比之自內不自失也得正則不自失矣比之匪人不亦傷乎外比於賢以從上也顯比之吉位正中也舍逆取順失前禽也邑人不誡上使中也由上之德使不偏也比之無首無所終也以上下之象言之則為無首以始終之象言之則為無終無首則無終矣風行天上小畜君子以懿文德風有氣而無質能畜而不能久故為小畜之象懿文德言未能厚積而逺施也復自道其義吉也牽復在中亦不自失也亦者承上爻義夫妻反目不能正室也程子曰脫輻反目三自為也有孚惕出上合志也有孚變如不獨冨也既雨既處德積載也君子征凶有所疑也上天下澤履君子以辨上下定民志程傳備矣素履之往獨行願也幽人貞吉中不自亂也眇能視不足以有明也跛能履不足以與行也嘻人之凶位不當也武人為于大君忘剛也訴訴終吉志行也夬履貞厲位正當也傷於所恃天地交泰后以財成天地之道輔相天地之宜以左右民財成以制其過輔相以輔其不及拔茅征吉志在外也包荒得尚于中行以光大也無往不復天地際也翩翩不冨皆失實也不戒以孚中心願也隂本居下在上為失實以祉元吉中以行願也城復于隍其命亂也命亂故復否告命所以治之也天地不交否君子以儉德辟難不可榮以祿收斂其德不形於外以辟小人之難人不得以祿位榮之拔茅征吉志在君也小人而變為君子則能以愛君為念而不計其私矣夫人否亨不亂羣也言不亂於小人之羣包羞位不當也有命無咎志行也大人之吉位正當也否終則傾何可長也天與火同人君子以類族辨物天在上而火炎上其性同也類族辨物所以審異而致同也出門同人又誰咎也同人于宗吝道也伏戎于莽敵剛也三嵗不興安行也言不能行乘其墉義弗克也其吉則困而反則也乘其墉矣則非其力之不足也特以義之弗克而不攻耳能以義斷困而反於法則故吉也同人之先以中直也大師相遇言相克也直謂理直同人于郊志未得也火在天上大有君子以遏惡揚善順天休命火在天上所照者廣為大有之象所有既大無以治之則釁孽萌于其間矣天命有善而無惡故遏惡揚善所以順天反之於身亦若是而已矣大有初九無交害也大車以載積中不敗也公用享于天子小人害也匪其彭無咎明辨晢也哲明貌厥孚交如信以發志也一人之信足以發上下之志也威如之吉易而無備也太柔則人將易之而無畏備之心大有上吉自天祐也地中有山謙君子以裒多益寡稱物平施以卑藴髙謙之象也裒多益寡所以稱物之宜而平其施損高增卑以趣於平亦謙之意也謙謙君子卑以自牧也鳴謙貞吉中心得也勞謙君子萬民服也無不利撝謙不違則也言不為過利用侵伐征不服也鳴謙志未得也可用行師征邑國也隂柔無位才力不足故其志未得而至於行師然亦適足以治其私邑而已雷出地奮豫先王以作樂崇德殷薦之上帝以配祖考雷出地奮和之至也先王作樂既象其聲又取其義殷盛也初六鳴豫志窮凶也窮謂滿極不終日貞吉以中正也盱豫有悔位不當也由豫大有得志大行也六五貞疾乘剛也恆不死中未亡也冥豫在上何可長也澤中有雷隨君子以嚮晦入晏息雷藏澤中隨時休息官有渝從正吉也出門交有功不失也係小子弗兼與也係丈夫志舍下也隨有獲其義凶也有孚在道明功也孚于嘉吉位正中也拘係之上窮也窮極也山下有風蠱君子以振民育德山下有風物壞而有事矣而事莫大於二者乃治已治人之道也幹父之蠱意承考也幹母之蠱得中道也幹父之蠱終無咎也裕父之蠱往未得也幹父用譽承以德也不事王侯志可則也澤上有地臨君子以教思無窮容保民無疆地臨於澤上臨下也二者皆臨下之事教之無窮者兊也容之無疆者坤也咸臨貞吉志行正也咸臨吉無不利未順命也未詳甘臨位不當也既憂之咎不長也至臨無咎位當也大君之宜行中之謂也敦臨之吉志在內也風行地上觀先王以省方觀民設教省方以觀民設教以為觀初六童觀小人道也窺觀女貞亦可醜也在丈夫則可醜也觀我生進退未失道也觀國之光尚賓也觀我生觀民也此夫子以義言之明人君觀已所行不但一身之得失又當觀民德之善否以自省察也觀其生志未平也志未平言雖不得位未可忘戒懼也雷電噬嗑先王以明罰敕法雷電當作電雷屨校滅趾不行也滅趾又有不進於惡之象噬膚滅鼻乘剛也遇毒位不當也利艱貞吉未光也貞厲無咎得當也何校滅耳聰不明也滅耳蓋罪其聽之不聰也若能審聽而早圖之則無此凶矣山下有火賁君子以明庶政無敢折獄山下有火眀不及逺明庶政事之小者折獄事之大者內離明而外艮止故取象如此舍車而徒義弗乘也君子之取舍決於義而巳賁其須與上興也永貞之吉終莫之陵也六四當位疑也匪冦婚媾終無尤也當位疑謂所當之位可疑也終無尤謂若守正而不與亦無他患也六五之吉有喜也白賁無咎上得志也山附於地剝上以厚下安宅剝牀以足以滅下也剝牀以辨未有與也言未大盛剝之無咎失上下也上下謂四隂剝牀以膚切近災也以宫人寵終無尤也君子得輿民所載也小人剝廬終不可用也雷在地中復先王以至日閉關商旅不行后不省方安靜以養微陽也月令是月齊戒掩身以待隂陽之所定不逺之復以修身也休復之吉以下仁也頻復之厲義無咎也中行獨復以從道也敦復無悔中以自考也考成也迷復之凶反君道也天下雷行物與無妄先王以茂對時育萬物天下雷行震動發生萬物各正其性命是物物而與之以無妄也先王法此以對時育物因其所性而不為私焉無妄之往得志也不耕穫未冨也冨如非冨天下之冨言非計其利而為之也行人得牛邑人災也可貞無咎固有之也有猶守也無妄之藥不可試也既已無妄而復藥之則反為妄而生疾矣試謂少嘗之也無妄之行窮之災也天在山中大畜君子以多識前言往行以畜其德天在山中不必實有是事但以其象言之耳有厲利己不犯災也輿説輹中無尤也利有攸往上合志也六四元吉有喜也六五之吉有慶也何天之衢道大行也山下有雷頥君子以慎言語節飲食二者養德飬身之切務觀我朵頥亦不足貴也六二征凶行失類也初上皆非其類也十年勿用道大悖也顛頥之吉上施光也居貞之吉順以從上也由頥厲吉大有慶也澤滅木大過君子以獨立不懼遁世無悶澤滅於木大過之象也不懼無悶大過之行也藉用白茅柔在下也老夫女妻過以相與也棟橈之凶不可以有輔也棟隆之吉不橈乎下也枯楊生華何可久也老婦士夫亦可醜也過涉之凶不可咎也水洊至習坎君子以常德行習教事治已治人皆必重習然後熟而安之習坎入坎失道凶也求小得未出中也來之坎坎終無功也樽酒簋剛柔際也陸氏釋文本無二字今從之坎不盈中未大也有中德而未大上六失道凶三嵗也明兩作離大人以繼明照于四方作起也履錯之敬以辟咎也黃離元吉得中道也日昃之離何可久也突如其來如無所容也無所容言焚死棄也六五之吉離王公也王用出征以正邦也原本周易本義卷五
