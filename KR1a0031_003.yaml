body:
  text: 原本周易本義卷三宋朱熹撰周易彖上傳彖即文王所繫之辭上者經之上篇傳者孔子所以釋經之辭也後凡言傳者放此大哉乾元萬物資始乃統天此専以天道明乾義又析元亨利貞為四德以發明之而此一節者釋元義也大哉歎辭元大也始也乾元天德之大始故萬物之生皆資之以為始也又為四德之首而貫乎天德之始終故曰統天雲行雨施品物流形釋乾之亨也大明終始六位時成時乘六龍以御天始即元也終謂貞也不終則無始不貞則無以為元也此言聖人大明乾道之終始則見卦之六位各以時成而乘此六陽以行天道是乃聖人之元亨也乾道變化各正性命保合大和乃利貞變者化之漸化者變之成物所受為性天所賦為命大和隂陽㑹合中和之氣也各正者得於有生之𥘉保合者全於巳生之後此言乾道變化無所不利而萬物各得其性命以自全以釋利貞之義也首出庶物萬國咸寧聖人在上高出於物猶乾道之變化也萬國各得其所而咸寧猶萬物之各正性命而保合大和也此言聖人之利貞也蓋嘗統而論之元者物之始生亨者物之暢茂利則向於實也貞則實之成也實之既成則其根蒂脫落可復種而生矣此四德之所以循環而無端也然而四者之間生氣流行初無間斷此元之所以包四德而統天也其以聖人而言則孔子之意蓋以此卦為聖人得天位行天道而致太平之占也雖其文義有非文王之舊者然讀者各以其意求之則並行而不悖也坤卦放此至哉坤元萬物資生乃順承天此以地道明坤之義而首言元也至極也比大義差緩始者氣之始生者形之始順承天施地之道也坤厚載物德合無疆含𢎞光大品物咸亨言亨也德合無疆謂配乾也牝馬地類行地無疆柔順利貞君子攸行言利貞也馬乾之象而以為地類者牝隂物而馬又行地之物也行地無疆則順而健矣柔順利貞坤之德也君子攸行人之所行如坤之德也所行如此則其占如下文所云也先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶陽大隂小陽得兼隂隂不得兼陽故坤之德常减於乾之半也東北雖喪朋然反之西南則終有慶矣安貞之吉應地無疆安而且貞地之德也屯剛柔始交而難生以二體釋卦名義始交謂震難生謂坎動乎險中大亨貞以二體之德釋卦辭動震之為也險坎之地也自此以下釋元亨利貞乃用文王本意雷雨之動滿盈天造草昧宜建侯而不寧以二體之𧰼釋卦辭雷震𧰼雨坎𧰼天造猶言天運草雜亂昧冥晦也隂陽交而雷雨作雜亂冥晦塞乎兩間天下未定名分未明宜立君以統治而未可遽謂安寧之時也不取𥘉九爻義者取義多端姑舉其一也蒙山下有險險而止蒙以卦象卦德釋卦名有兩義蒙亨以亨行時中也匪我求童蒙童蒙求我志應也初筮告以剛中也再三瀆瀆則不告瀆蒙也蒙以養正聖功也以卦體釋卦辭也九二以可亨之道發人之蒙而又得其時之中謂如下文所指之事皆以亨行而當其可也志應者二剛明五柔暗故二不求五而五求二其志自相應也以剛中者以剛而中故能告而有節也瀆筮者二三則問者固瀆而告者亦瀆矣䝉以養正乃作聖之功所以釋利貞之義也需須也險在前也剛健而不陷其義不困窮矣此以卦德釋卦名義需有孚光亨貞吉位乎天位以正中也利涉大川往有功也以卦體及兩𧰼釋卦辭訟上剛下險險而健訟以卦德釋卦名義訟有孚窒惕中吉剛來而得中也終凶訟不可成也利見大人尚中正也不利涉大川入于淵也以卦變卦體卦象釋卦辭師衆也貞正也能以衆正可以王矣此以卦體釋師貞之義以謂能左右之也則陽在下之中而五隂皆為所以也能以衆正王者之師矣剛中而應行險而順以此毒天下而民從之吉又何咎矣又以卦體卦德釋丈人吉無咎之義剛中謂九二應謂六五應之行險謂行危道順謂順人心此非有老成之德者不能也毒害也師旅之興不無害於天下然以其有是才德是以民悅而從之也比吉也此三字疑衍文比輔也下順從也此以卦體釋卦名義原筮元永貞無咎以剛中也不寧方來上下應也後夫凶其道窮也亦以卦體釋卦辭剛中謂五上下謂五隂小畜柔得位而上下應之曰小畜以卦體釋卦名義柔得位指六居四上下謂五陽健而巽剛中而志行乃亨以卦德卦體而言陽猶可亨也密雲不雨尚往也自我西郊施未行也尚往言畜之未極其氣猶上進也履柔履剛也以二體釋卦名義說而應乎乾是以履虎尾不嘻人亨以卦德釋彖辭剛中正履帝位而不疚光明也又以卦體明之指九五也泰小往大來吉亨則是天地交而萬物通也上下交而其志同也內陽而外隂內健而外順內君子而外小人君子道長小人道消也否之匪人不利君子貞大往小來則是天地不交而萬物不通也上下不交而天下無邦也內隂而外陽內柔而外剛內小人而外君子小人道長君子道消也同人柔得位得中而應乎乾曰同人以卦體釋卦名義柔謂六二乾謂九五同人曰衍文同人于野亨利涉大川乾行也文明以健中正而應君子正也唯君子為能通天下之志以卦德卦體釋卦辭通天下之志乃為大同不然則是私情之合而巳何以致亨而利涉哉大有柔得尊位大中而上下應之曰大有以卦體釋卦名義柔謂六五上下謂五陽其德剛健而文明應乎天而時行是以元亨以卦德卦體釋卦辭應天指六五也謙亨天道下濟而光明地道卑而上行言謙之必亨天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也變謂傾壞流謂聚而歸之人能謙則其居尊者其德愈光其居卑者人亦莫能過此君子所以有終也豫剛應而志行順以動豫以卦體卦德釋卦名義豫順以動故天地如之而况建侯行師乎以卦德釋卦辭天地以順動故日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉極言之而贊其大也隨剛來而下柔動而說隨以卦變卦德釋卦名義大亨貞無咎而天下隨時王肅本時作之今當從之釋卦辭言能如是剛天下之所從也隨時之義大矣哉王肅本時字在之字下今當從之蠱剛上而柔下巽而止蠱以卦體卦變卦德釋卦名義蓋如此則積弊而至於蠱矣蠱元亨而天下治也利涉大川往有事也先甲三日後甲三日終則有始天行也釋卦辭治蠱至於元亨則亂而復治之象也亂之終治之始天運然也臨剛浸而長以卦體釋卦名說而順剛中而應又以卦德卦體言卦之善大亨以正天之道也當剛長之時又有此善故其占如此也至於八月有凶消不久也言雖天運之當然然君子宜知所戒大觀在上順而巽中正以觀天下以卦體卦德釋卦名義觀盥而不薦有孚顒若下觀而化也釋卦辭觀天之神道而四時不忒聖人以神道設教而天下服矣極言觀之道也四時不忒天之所以為觀也神道設教聖人之所以為觀也頥中有物曰噬嗑以卦體釋卦名義噬嗑而亨剛柔分動而明雷電合而章柔得中而上行雖不當位利用獄也又以卦名卦體卦德二象卦變釋卦辭賁亨亨字疑衍柔來而文剛故亨分剛上而文柔故小利有攸往天文也以卦變釋卦辭剛柔之交自然之𧰼故曰天文先儒說天文上當有剛柔交錯四字理或然也文明以止人文也又以卦德言之止謂各得其分觀乎天文以察時變觀乎人文以化成天下極乎賁道之大也剝剝也柔變剛也以卦體釋卦名義言柔進干陽變剛為柔也不利有攸往小人長也順而止之觀象也君子尚消息盈虛天行也以卦體卦德釋卦辭復亨剛反剛反則亨動而以順行是以出入無疾朋來無咎以卦德而言反復其道七日來復天行也隂陽消息天運然也利有攸往剛長也以卦體而言既生則漸長矣復其見天地之心乎積隂之下一陽復生天地生物之心幾於滅息而至此乃復可見在人則為靜極而動惡極而善本心幾息而復見之端也程子論之詳矣而邵子之詩亦曰冬至子之半天心無改移一陽初動處萬物未生時𤣥酒味方淡大音聲正希此言如不信更請問包犧至哉言也學者宜盡心焉無妄剛自外來而為主於內動而健剛中而應大亨以正天之命也其匪正有眚不利有攸往無妄之往何之矣天命不佑行矣哉以卦變卦德卦體言卦之善如此故其占當蒦大亨而刋於正乃天命之當然也其有不正則不利冇所往欲何往哉蓋其逆天之命而天不佑之故不可以有行也大畜剛健篤實輝光日新其德以卦德釋卦名義剛上而尚賢能止健大正也以卦變卦體釋卦辭不家食吉養賢也亦取尚賢之象利涉大川應乎天也亦以卦體而言頥貞吉養正則吉也觀頥觀其所養也自求口實觀其自養也釋卦辭天地養萬物聖人養賢以及萬民頥之時大矣哉極言養道而贊之大過大者過也以卦體釋卦名義棟橈本末弱也復以卦體卦辭本謂初未謂上弱謂隂柔剛過而中巽而說行利有攸往乃亨又以卦體卦德釋卦辭大過之時大矣哉大過之時非有大過人之材不能濟也故歎其大習坎重險也釋卦名義水流而不盈行險而不失其信以卦象釋有孚之義言內實而行有常也惟心亨乃以剛中也行有尚往有功也以剛在中心亨之𧰼如是而往必有功也天險不可升也地險山川丘陵也王公設險以守其國險之時用大矣哉極言之而贊其大也離麗也日月麗乎天百榖草木麗乎土重明以麗乎正乃化成天下釋卦名義柔麗乎中正故亨是以畜牝牛吉也以卦體釋卦辭原本周易本義卷三
