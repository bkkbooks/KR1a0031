  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0031_WYG_006-1a, image: WYG0012/WYG0012-0675c.png}
body:
  text: 原本周易本義卷六宋朱熹撰周易象下傳山上有澤咸君子以虛受人山上有澤以虛而通也咸其拇志在外也雖凶居吉順不害也咸其股亦不處也志在隨人所執下也言亦者因前二爻皆欲動而云也二爻隂躁其動也宜九三陽剛居止之極冝靜而動可吝之甚也貞吉悔亡未感害也憧憧往來未光大也感害言不正而感則有害也咸其脢志末也志末謂不能感物咸其輔頰舌滕口説也滕騰通用雷風恆君子以立不易方浚恆之凶始求深也九二悔亡能久中也不恆其德無所容也久非其位安得禽也婦人貞吉從一而終也夫子制義從婦凶也振恆在上大無功也天下有山遁君子以逺小人不惡而嚴天體無窮山高有限遁之象也嚴者君子自守之常而小人自不能近遁尾之厲不往何災也執用黃牛固志也係遁之厲有疾憊也畜臣妾吉不可大事也君子好遁小人否也嘉遁貞吉以正志也肥遁無不利無所疑也雷在天上大壯君子以非禮勿履自騰者強壯于趾其孚窮也言必田窮九二貞吉以中也小人用壯君子罔也小人以壯敗君子以罔困藩決不羸尚往也喪羊于易位不當也不能退不能遂不詳也艱則吉咎不長也明出地上晉君子以自昭明德昭明之也晉如摧如獨行正也裕無咎未受命也初居下位未有官守之命受兹介福以中正也衆允之志上行也鼫鼠貞厲位不當也失得勿恤往有慶也維用伐邑道未光也明入地中明夷君子以涖衆用晦而明君子于行義不食也唯義所在不食可也六二之吉順以則也南狩之志乃大得也入于左腹獲心意也箕子之貞明不可息也初登于天照四國也照四國以位言後入于地失則也風自火出家人君子以言有物而行有恆身修則家治矣間有家志未變也志未變而豫防之六二之吉順以巽也家人嗃嗃未失也婦子嘻嘻失家節也冨家大吉順在位也王假有家交相愛也程子曰夫愛其內助婦愛其刑家威如之吉反身之謂也謂非作威也反身自心則人畏服之矣上火下澤睽君子以同而異二卦合體而性不同見惡人以辟咎也遇主于巷未失道也本其正應非有邪也見輿曵位不當也無初有終遇剛也交孚無咎志行也厥宗噬膚往有慶也遇雨之吉羣疑亡也山上有水蹇君子以反身修德往蹇來譽冝待也王臣蹇蹇終無尤也事雖不濟亦無可尤往蹇來反內喜之也往蹇來連當位實也大蹇朋來以中節也往蹇來碩志在內也利見大人以從貴也雷雨作解君子以赦過宥罪剛柔之際義無咎也九二貞吉得中道也負且乘亦可醜也自我致戎又誰咎也解而拇未當位也君子有解小人退也公用射隼以解悖也山下有澤損君子以懲忿窒欲君子修身所當損者莫切于此已事遄往尚合志也尚上通九二利貞中以為志也一人行三則疑也損其疾亦可喜也六五元吉自上祐也弗損益之大得志也風雷益君子以見善則遷有過則改風雷之𫝑交相助益遷善改過益之大者而其相益亦猶是也元吉無咎下不厚事也下本不當任厚事故不如是不足以塞咎也或益之自外來也或者衆典定主之辭益用凶事固有之也益用凶事欲其用心衡慮而固有之也告公從以益志也有孚惠心勿問之矣惠我德大得志也莫益之偏辭也或擊之自外來也莫益之者猶從其求益之偏辭而言也若究而言之則又有擊之者矣澤上于天夬君子以施祿及下居德則忌澤上于天潰決之𫝑也施祿及下潰決之意也居德則忌未詳不勝而往咎也有戎勿恤得中道也君子夬夬終無咎也其行次且位不當也聞言不信聰不明也中行無咎中未光也程傳備矣無號之凶終不可長也天下有風姤后以施命誥四方繫于金柅柔道牽也牽進也以其進故止之包有魚義不及賓也其行次且行未牽也無魚之凶逺民也民之去巳由已逺之九五含章中正也有隕自天志不舍命也姤其角上窮吝也澤上於地萃君子以除戎器戒不虞除者修而聚之之謂乃亂乃萃其志亂也引吉無咎中未變也往無咎上巽也大吉無咎位不當也萃有位志未光也未光謂匪孚齎咨涕洟未安上也地中生木升君子以順德積小以高大王肅本順作愼今按它書引此亦多作慎意尤明白蓋古字通用也説見上篇蒙卦允升大吉上合志也九二之孚有喜也升虛邑無所疑也王用亨于岐山順事也以順而升登祭于山之象貞吉升階大得志也冥升在上消不冨也澤無水困君子以致命遂志水下溝則澤上枮故曰澤無水致命猶言授命言持以與人而不之有也能如是則雖困而亨矣入于幽谷幽不明也困于酒食中有慶也據于蒺藜乘剛也入于其宫不見其妻不祥也來徐徐志在下也雖不當位有與也劓刖志未得也乃徐有説以中直也利用祭祀受福也困于葛藟未當也動悔有悔吉行也木上有水井君子以勞民勸相木上有水津潤上行井之象也勞民者以君養民勸相者使民相養皆取井養之義井泥不食下也舊井無禽時舍也言為時所棄井谷射鮒無與也井泄不食行惻也求王明受福也行惻者行道之人皆以為惻也井甃無咎修井也寒泉之食中正也元吉在上大成也澤中有火革君子以治厯明時四時之變革之大者鞏用黃牛不可以有為也已日革之行有嘉也革言三就又何之矣言已審改命之吉信志也大人虎變其文炳也君子豹變其文蔚也小人革靣順以從君也木上有火鼎君子以正位凝命鼎重器也故有正位凝命之意凝猶至道不凝焉之凝傳所謂協于上下以承天休者也鼎顛趾未悖也利出否以從貴也鼎而顛趾悖道也而因可出否以從貴則未為悖也從貴謂應四亦為取新之意鼎有實慎所之也我仇有疾終無尤也有實而不謹其所往則為仇所即而陷于惡矣鼎耳革失其義也覆公餗信如何也言失信也鼎黃耳中以為實也玉鉉在上剛柔節也洊雷震君子以恐懼修省震來虩虩恐致福也笑言啞啞後有則也震來厲乘剛也震蘇蘇位不當也震遂泥未光也震往來厲危行也其事在中大無喪也震索索中未得也雖凶無咎畏鄰戒也中謂中心兼山艮君子以思不出其位艮其趾未失正也不拯其隨未退聽也三止乎上亦不肯退而聽乎二也艮其限危熏心也艮其身止諸躬也艮其輔以中正也正字羡文協韻可見敦艮之吉以厚終也山上有木漸君子以居賢德善俗二者皆當以漸而進疑賢字衍或善下有脫字小子之厲義無咎也飲食衎衎不素飽也素飽如詩素飱得之以道則不為徒飽而處之安矣夫征不復離羣醜也婦孕不育失其道也利用禦寇順相保也或得其桷順以巽也終莫之勝吉得所願也其羽可用為儀吉不可亂也漸進愈高而不為無用其志卓然豈可得而亂哉澤上有雷歸妹君子以永終知敝雷動澤隨歸妹之象君子觀其合之不正知其終之有敝也推之事物莫不皆然歸妹以娣以恆也跛能履吉相承也恆謂有常久之德利幽人之貞未變常也歸妹以須未當也愆期之志有待而行也帝乙歸妹不如其娣之袂良也其位在中以貴行也以其冇中德之貴而行故不尚飾上六無實承虛筐也雷電皆至豐君子以折獄致刑取其威熙並行之象雖旬無咎過旬災也戒占者不可求勝其配亦爻辭外意有孚發若信以發志也豐其沛不可大事也折其右肱終不可用也豐其蔀位不當也日中見斗幽不明也遇其夷主吉行也六五之吉有慶也豐其屋天際翔也窺其户閴其無人自藏也藏謂障蔽山下有火旅君子以明慎用刑而不留獄謹刑如山不留如火旅瑣瑣志窮災也得童僕貞終無尤也旅焚其次亦已傷矣以旅與下其義喪也以旅之時而與下之道如此義常喪也旅于處未得位也得其資斧心未快也終以譽命上逮也上逮言其譽命間于上也以旅在上其義焚也喪牛于易終莫之聞也隨風巽君子以申命行事隨相繼之義進退志疑也利武人之貞志治也紛若之吉得中也頻巽之吝志窮也田獲三品有功也九五之吉位正中也巽在牀下上窮也喪其資斧正乎凶也正乎凶言必凶麗澤兑君子以朋友講習兩澤相麗互相滋益朋友講習其象如此和兌之吉行未疑也居卦之𥘉其説也正未有所疑也孚兑之吉信志也來兑之凶位不當也九四之喜有慶也孚于剝位正當也與履九五同上六引兑未光也風行水上渙先王以享于帝立廟皆所以合其散初六之吉順也渙奔其機得願也渙其躬志在外也涣其羣元吉光大也王居無咎正位也涣其血逺害也澤上有水節君子以制數度議德行不出户庭知通塞也不出門庭凶失時極也不節之嗟又誰咎也此無咎與諸爻異言無所歸咎也安節之亨承上道也甘節之吉居位中也苦節貞凶其道窮也澤上有風中孚君子以議獄緩死風感水受中孚之象議獄緩死中孚之意初九虞吉志未變也其子和之中心願也或鼓或罷位不當也馬匹亡絶類上也有孚攣如位當也翰音登于天何可長也山上有雷小過君子以行過乎恭喪過乎哀用過乎儉山上有雷其聲小過三者之過皆小者之過可過於小而不可過於大可以小過而不可甚過彖所謂可小事而宜下者也飛鳥以凶不可如何也不及其君臣不可過也所以不及君而還遇臣者以臣不可過故也從或戕之凶如何也弗過遇之位不當也往厲必戒終不可長也爻義未明此亦當闕密雲不雨已上也巳上太高也弗遇過之已亢也水在火上既濟君子以思患而預防之曵其輪義尤咎也七日得以中道也三年克之憊也終日戒有所疑也東鄰殺牛不如西鄰之時也實受其福吉大來也濡其首厲何可久也火在水上未濟君子以慎辨物居方水火異物各居其所故君子觀象而審辨之濡其尾亦不知極也極字未詳考上下韻亦不叶或恐是敬字今且闕之九二貞吉中以行正也九居二本非正以中故得正也未濟征凶位不當也貞吉悔亡志行也君子之光其暉吉也暉者光之散也飲酒濡首亦不知節也原本周易本義卷六
