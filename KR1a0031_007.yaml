body:
  text: 原本周易本義卷七宋朱熹撰周易繫辭上傳繫辭本謂文王周公所作之辭繫于卦爻之下者即今經文此篇乃孔子所述繫辭之傳也以其通論一經之大體凡例故無經可附而自分上下云天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣方以類聚物以羣分吉凶生矣在天成象在地成形變化見矣天地者隂陽形氣之實體乾坤者易中純隂純陽之卦名也卑高者天地萬物上下之位貴賤者易中卦爻上下之位也動者陽之常靜者隂之常剛柔者易中卦爻隂陽之稱也方謂事情所向言事物善惡各以類分而吉凶者易中卦爻占決之辭也象者日月星辰之屬形者山川動植之屬變化者易中蓍䇿卦爻隂變為陽陽化為隂者也此言聖人作易因隂陽之實體為卦爻之法象莊周所謂易以道隂陽此之謂也是故剛柔相摩八卦相蕩此言易卦之變化也六十四卦之𥘉剛柔兩畫而巳兩相摩而為四四相摩而為八八相蕩而為六十四鼓之以雷霆潤之以風雨日月運行一寒一暑此變化之成象者乾道成男坤道成女此變化之成形者此兩節又明易之見於實體者與上文相發明也乾知大始坤作成物知猶主也乾主始物而坤作成之承上文男女而言乾坤之理蓋凡物之屬乎隂陽者莫不如此大扺陽先隂後陽施隂受陽之輕清未形而隂之重濁有迹乾以易知坤以簡能乾健而動即其所知便能始物而無所難故為以易而知太始坤順而靜凡其所能皆從乎陽而不自作故為以簡而能成物易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業人之所為如乾之易則其心明白而人易知如坤之簡則其事要約而人易從易知則與之同心者多故有親易從則與之協力者衆故有功有親則一於內故可久有功則兼於外故可大德謂得於巳者業謂成於事者上言乾坤之德不同此言人法乾坤之道至此則可以為賢矣易簡而天下之理得矣天下之理得而成位乎其中矣成位謂成人之位其中謂天地之中至此則體道之極功聖人之能事可以與天地參矣分此第一章以造化之之實明作經之理又言乾坤之理見於天地而人兼體也聖人設卦觀象繫辭焉而明吉凶象者物之似也此言聖人作易觀卦爻之象而繫以辭也剛柔相推而生變化言卦爻隂陽迭相推蕩而隂或變陽陽或化隂聖人所以觀象而繫辭衆人所以因蓍以求卦者也是故吉凶者失得之象也悔吝者憂虞之象也吉凶悔吝者易之辭也失得憂虞者事之變也得則吉失則凶憂虞雖未至凶然已足以致悔而取羞矣蓋吉凶相對而悔吝居其中間悔自凶而趨吉吝自吉而向凶也故聖人觀卦爻之中或冇此象即繫之以此辭也變化者進退之象也剛柔者晝夜之象也六爻之動三極之道也柔變而趨於剛者退極而進也剛化而趨於柔者進極而退也既變而剛則晝而陽矣既化而柔則變夜而隂矣六爻𥘉二為地三四為人五上為天動即化也極至也三極天地人之至理三才各一太極也此明剛柔相推以生變化而變化之極復為剛柔流行於一卦六爻之間而占者得因所值以斷吉凶也是故君子所居而安者易之序也所樂而玩者爻之辭也易之序謂卦爻所著事理當然之次第玩者觀之詳是故君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利象辭變已見上凡單言變者化在其中占謂其所值吉凶之決也易此第二章言事聖人作君子學易之彖者言乎象者也爻者言乎變者也彖謂卦辭文王所作者爻謂爻辭周公所作者象指全體而言變指一節而言吉凶者言乎其失得也悔吝者言乎其小疵也無咎者善補過也此卦爻辭之通例是故列貴賤者存乎位齊小大者存乎卦辨吉凶者存乎辭位謂六爻之位齊猶定也小謂隂大謂陽憂悔吝者存乎介震無咎者存乎悔介謂辨别之端蓋善惡已動而未形之時也於此憂之則不至於悔吝矣震動也知悔則有以動其輔過之心而可以無咎矣是故卦有小大辭有險易辭也者各指其所之小險大易各隨所向通此第三章釋卦爻辭之例易與天地凖故能彌綸天地之道易書卦爻具有天地之道與之齊凖彌如彌縫之彌有終竟聨合之意綸有選擇條理之意仰以觀於天文俯以察於地理是故知幽明之故原始反終故知死生之説精氣為物遊魂為變是故知鬼神之情狀此窮理之事以者聖人以易之書也易者隂陽而已幽明死生鬼神皆隂陽之變天地之道也天文則有晝夜上下地理則有南北高深原者推之於前反者要之於後隂精陽氣聚而成物神之申也魂遊魂降散而為變鬼之歸也與天地相似故不違知周乎萬物而道濟天下故不過旁行而不流樂天知命故不憂安土敦乎仁故能愛此聖人盡性之事也天地之道知仁而已知周萬物者天也道濟天下者地也知且仁則知而不過矣旁行者行權之知也不流者守正之仁也既樂天理而又知天命故能無憂而其知益深隨處皆安而無一息之不仁故能不忘其濟物之心而仁益篤蓋仁者愛之理愛者仁之用故其相為表裏如此範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體此聖人至命之事也範如鑄金之有模範圍匡郭也天地之化無窮而聖人為之範圍不使過於中道所謂裁成者也通猶兼也晝夜即幽明死生鬼神之謂如此然後可見至神之妙無有方所易之變化無有形體也此第四章言易道之大聖人用之如此一隂一陽之謂道隂陽迭運者氣也其理則所謂道繼之者善也成之者性也道具於隂而行乎陽繼言其發也善謂化育之功陽之事也成言其具也性謂物之所受言物生則有性而各具是道也隂之事也周子程子之書言之備矣仁者見之謂之仁知者見之謂之知百姓日用而不知故君子之道鮮矣仁陽知隂各得是道之一隅故隨其所見而目為全體也日用不知則莫不飲食鮮能知味者又其每下者也然亦莫不有是道焉或曰上章以知屬乎天仁屬乎地與此不同何也曰彼以清濁言此以動靜言顯諸仁藏諸用鼓萬物而不與聖人同憂盛德大業至矣哉顯自內而外也仁謂造化之功德之發也藏自外而內也用謂機緘之妙業之本也程子曰天地無心而成化聖人有心而無為冨有之謂大業日新之謂盛德張子曰冨有者大無外日新者久無窮生生之謂易隂生陽陽生隂其變無窮理與書皆然也成象之謂乾效法之謂坤效呈也法謂造化之詳密而可見者極數知來之謂占通變之謂事占筮也事之未定者屬乎陽也事行事也占之已決者屬乎隂也極數知來所以通事之變張忠定公言公事有隂陽意蓋如此隂陽不測之謂神張子曰兩在故不測此第五章言道之體用不外乎隂陽而其所以然者則未嘗倚於隂陽也夫易廣矣大矣以言乎逺則不禦以言乎邇則靜而正以言乎天地之間則備矣不禦言無盡靜而正言即物而理存備言無所不有夫乾其靜也專其動也直是以大生焉夫坤其靜也翕其動也闢是以廣生焉乾坤各有動靜於其四德見之靜體而動用靜别而動交也乾一而實故以質言而曰大坤二而虛故以量言而曰廣蓋天之形雖包於地之外而其氣常行乎地之中也易之所以廣大者以此廣大配天地變通配四時隂陽之義配日月易簡之善配至德易之廣大變通與其所言隂陽之説易簡之德配之天道人事則如此此第六章子曰易其至矣乎夫易聖人所以崇德而廣業也知崇禮卑崇效天卑法地十翼皆夫子所作不應自著子曰字疑後人卑所加也窮理則知崇如天而德崇循理則禮如地而業廣此其取類又以清濁言也天地設位而易行乎其中矣成性存存道義之門天地設位而變化行猶知禮存性而道義出也成性本成之性也存存謂存而又存不巳之意也此第七章聖人有以見天下之賾而擬諸其形容象其物宜是故謂之象賾雜亂也象卦之象如説卦所列者聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻會謂理之所聚而不可遺處通謂理之可行而無礙處如庖丁解牛會則其族而通則其虛也言天下之至賾而不可惡也言天下之至動而不可亂也惡猶厭也擬之而後言議之而後動擬議以成其變化觀象玩辭觀變玩占而法行之此下七爻則其例也鳴鶴在隂其子和之我有好爵吾與爾靡之子曰君子居其室出其言善則千里之外應之况其邇者乎居其室出其言不善則千里之外違之况其邇者乎言出乎身加乎民行發乎邇見乎逺言行君子之樞機樞機之發榮辱之主也言行君子之所以動天地也可不慎乎釋中孚九二爻義同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同心之言其臭如蘭釋同人九五爻義言君子之道初若不同而後實無間斷金如蘭言物莫能間而其言有味也初六藉用白茅無咎子曰苟錯諸地而可矣藉之用茅何咎之有慎之至也夫茅之為物薄而用可重也慎斯術也以往其無所失矣釋大過初六爻義勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也釋謙九三爻義德言盛禮言恭言德欲其盛禮欲其恭也亢龍有悔子曰貴而無位高而無民賢人在下位而無輔是以動而有悔也釋乾上九爻義當屬文言此蓋重出不出戶庭無咎子曰亂之所生也則言語以為階君不密則失臣臣不密則失身幾事不密則害成是以君子慎密而不出也釋節初九爻義子曰作易者其知盜乎易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也釋解六三爻義之此第八章言卦爻用天一地二天三地四天五地六天七地八天九地十此簡本在第十章之首程子曰冝在此今從之此言天地之數陽竒隂耦即所謂河圖者也其位一六居下二七居上三八居左四九居右五十居中就此章而言之則中五為衍母次十為衍子次一二三四為四象之位次六七八九為四象之數二老位於西北二少位於東南其數則各以其類交錯於外也天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也此簡本在大衍之後今按宜在此天數五者一三五七九皆竒也地數五者二四六八十皆耦也相得謂一與二三與四五與六七與八九與十各以竒耦為類而自相得有合謂一與六二與七三與八四與九五與十皆兩相合二十有五者五竒之積也三十者五耦之積也變化謂一變生水而六化成之二化生火而七變成之三變生木而八化成之四化生金而九變成之五變生土而十化成之鬼神謂凡竒耦生成之屈伸往來者大衍之數五十其用四十有九分而為二以象兩卦一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後卦大衍之數五十蓋以河圖中宫天五乘地十而得之至用以筮則又止用四十有九蓋皆出於理𫝑之自然而非人之知力所能損益也兩謂天地也挂懸其一於左手小指之間也三三才也揲間而數之也竒所揲四數之餘也扐勒於左手中三指之兩間也閏積月之餘日而成月者也五嵗之間再積日而再成月故五嵗之中凡有再閏别起積分如一卦之後左右各一揲而一扐故五者之中凡有再扐然後别起一卦也乾之䇿二百一十有六坤之䇿百四十有四凡三百有六十當期之日凡此䇿數生於四象蓋河圖四靣太陽居一而連九少隂居二而連八少陽居三而連七太隂居四而連六揲蓍之法則通計三變之餘去其𥘉挂之一凡四為竒凡八為耦竒圓圍三耦方圍四三用其全四用其半積而數之則為六七八九而第三變揲數䇿數亦皆符會蓋餘三竒則九而其揲亦九䇿亦四九三十六是為居一之太陽餘二竒一耦則八而其揲亦八䇿亦四八三十二是為居二之少隂二耦一竒則七而其揲亦七䇿亦四七二十八是為居三之少陽三耦則六而其揲亦六䇿亦四六二十四是為居四之老隂是其變化往來進退離台之妙皆出自然非人之所能為也少隂退而未極乎虛少陽進而未極乎盈故此獨以老陽老隂計乾坤六爻之䇿數餘可推而知也期周一嵗也凡三百六十五日四分日之一此特舉成數而概言之耳二篇之䇿萬有一千五百二十當萬物之數也二篇謂上下經凡陽爻百九十二得六千九百一十二䇿隂爻百九十二得四千六百八䇿合之得此數是故四營而成易十有八變而成卦四營謂分二挂一揲四歸竒也易變也謂一變也三變成爻十八變則成六爻也八卦而小成謂九變而成三畫得內卦也引而伸之觸類而長之天下之能事畢矣謂已成六爻而視其爻之變與不變以為動靜則一卦可變而為六十四卦以定吉凶凡四千九十六卦也顯道神德行是故可與酬酢可與祐神矣道因辭顯行以數神酬酢謂應對祐神謂助神化之功子曰知變化之道者其知神之所為乎變化之道即上文數法是也皆非人之所能為故夫子歎之而門人加子曰以别上文也矣此第九章言天地大衍之數揲蓍求卦之法然亦略意其詳具於太卜筮人之官而今不可考耳其可推者啓蒙備言之易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占四者皆變化之道神之所為也是以君子將有為也將有行也問焉而以言其受命也如響無有逺近幽深遂知來物非天下之至精其孰能與於此此尚辭尚占之事言人以蓍問易求其卦爻之辭而以之發言處事則易受人之命而有以告之如響之應聲以決其未來之吉凶也以言與以言者尚其辭之以言義同命則將筮而告蓍也之語冠禮筮日宰自右贊命是參伍以變錯綜其數通其變遂成天下之文極其數遂定天下之象非天下之至變其孰能與於此此尚象之事變則象之未定者也參者三數之也伍者五數之也既參以變又伍以變一先一後更相考核以審其多寡之實也錯者交而互之一左一右之謂也綜者總而挈之一低一昂之謂也此亦皆謂揲蓍求卦之事蓋通三揲兩手之䇿以成隂陽老少之畫究七八九六之數以定卦爻動靜之象也參伍錯綜皆古語而參伍尤難曉按荀子云窺敵制變欲伍以參韓非曰省同異之言以知朋黨之分偶參伍之驗以責陳言之實又曰參之以比物伍參之以合參史記曰必參而伍之又曰參伍不失漢書曰伍其賈以類相凖此足以相發明矣易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此哉此四者之體所以立而用所以行者也易指蓍卦無思無為言其無心也寂然者感之體感通者寂之用人心之妙其動靜亦如此夫易聖人之所以極深而研幾也研猶審也幾微也所以極深者至精也所以研幾者至變也唯深也故能通天下之志唯幾也故能成天下之務唯神也故不疾而速不行而至所以通志而成務者神之所為也子曰易有聖人之道四焉此之謂也章此第十章承上之意言易之用有此四者子曰夫易何為者也夫易開物成務冒天下之道如斯而已者也是故聖人以通天下之志以定天下之業以斷天下之疑開物成務謂使人卜筮以知吉凶而成事業冒天下之道謂卦爻既設而天下之道皆在其中是故蓍之德圓而神卦之德方以知六爻之義易以貢聖人以此洗心退藏於密吉凶與民同患神以知來知以藏往其孰能與於此哉古之聰明睿知神武而不殺者夫圓神謂變化無方方知謂事有定理易以貢謂變易以告人聖人體具三者之德而無一塵之纍無事則其心寂然人莫能窺有事則殺神知之用隨感而應所謂無卜筮而知吉凶也神武不得其理而不假其物之謂是以明於天之道而察於民之故是興神物以前民用聖人以此齊戒以神明其德夫神物謂筮龜湛然純一之謂齊肅然警惕之謂戒明天道故知神物之可興察民故故知其用之不可不有以開其先是以作為卜筮以教人於此焉齊戒以考其占使其心神明不測如鬼神之能知來也是故闔戶謂之坤闢户謂之乾一闔一闢謂之變往來不窮謂之通見乃謂之象形乃謂之器制而用之謂之法利用出入民咸用之謂之神闔闢動靜之機也先言坤者由靜而動也乾坤變通者化育之功也見象形器者生物之序也法者聖人修道之所為而神者百姓自然之日用也是故易有大極是生兩儀兩生生四象四象生八卦一每生二自然之理也易者隂陽之變大極者其理也兩儀者始為一畫以分隂陽四象者次為二畫以分太少八卦者次為三畫而三才之象始備此數言者實聖人作易自然之次第有不假絲毫知力而成者畫卦揲蓍其序皆然詳見序例啓蒙八卦定吉凶吉凶生大業有吉有凶是生大業是故法象莫大乎天地變通莫大乎四時縣象著明莫大乎日月崇高莫大乎冨貴備物制用立成器以為天下利莫大乎聖人探賾索隱鈎深致逺定天下之吉凶成天下之亹亹者莫大乎蓍龜冨貴謂有天下履帝位立下疑有闕文亹亹猶勉勉也疑則怠決故勉是故天生神物聖人則之天地變化聖人效之天垂象見吉凶聖人象之河出圖洛出書聖人則之此四者聖人作易之所由也河圖洛書詳見啓蒙易有四象所以示也繫辭焉所以告也定之以吉凶所以斷也四象謂隂陽老少示謂示人以所值之卦爻此第十一章專言卜筮易曰自天祐之吉無不利子曰祐者助也天之所助者順也人之所助者信也履信思乎順又以尚賢也是以自天祐之吉無不利釋大有上九爻義然在此無所屬或恐是錯簡冝在第七章之末子曰書不盡言言不盡意然則聖人之意其不可見乎子曰聖人立象以盡意設卦以盡情偽繫辭焉以盡其言變而通之以盡利鼓之舞之以盡神言之所傳者淺象之所示者深觀竒耦二畫包含變化無有窮盡則可見矣變通鼓舞以事而言兩子曰字宜衍其一蓋子曰字皆後人所加故有此誤如近世通書乃周子所自作亦為後人每章加以周子曰字其設問答處正如此也乾坤其易之緼耶乾坤成列而易立乎其中矣乾坤毁則無以見易易不可見則乾坤或幾乎息矣緼所包蓄者猶衣之著也易之所有隂陽而巳凡陽皆乾凡隂皆坤畫卦定位則二者成列而易之體立矣乾坤毁謂卦畫不立乾坤息謂變化不行是故形而上者謂之道形而下者謂之器化而裁之謂之變推而行之謂之通舉而錯之天下之民謂之事業卦爻隂陽皆形而下者其理則道也因其自然之化而裁制之變之義也通變二字上章以天言此章以人言是故夫象聖人有以見天下之賾而擬諸其形容象其物冝是故謂之象聖人有以見天下之動而觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻重出以起下文極天下之賾者存乎卦鼓天下之動者存乎辭卦即象也辭即爻也化而裁之存乎變推而行之存乎通神而明之存乎其人默而成之不言而信存乎德行卦爻所以變通者在人人之所以能神而明之者在德此第十二章原本周易本義卷七
