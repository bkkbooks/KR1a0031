body:
  text: 原本周易本義卷八宋朱熹撰周易繫辭下傳八卦成列象在其中矣因而重之爻在其中矣成列謂乾一兑二離三震四巽五坎六艮七坤八之類象謂卦之形體也因而重之謂各因一卦而以八卦次第加之為六十四也爻六爻也既重而後卦有六爻也剛柔相推變在其中矣繫辭焉而命之動在其中矣剛柔相推而卦爻之變往來相錯無不可見聖人因其所見而皆繫之辭以命其吉凶則占者所值當動之爻象亦不出乎此矣吉凶悔吝者生乎動者也吉凶悔吝皆辭之所命也然必因卦爻之動而後見剛柔者立本者也變通者趣時者也一剛一柔各有定位自此以後變以從時吉凶者貞勝者也貞正也常也物以其所正為常者也天下之事非吉則凶非凶則吉常相勝而不已也天地之道貞觀者也日月之道貞明者也天下之動貞夫一者也觀示也天下之動其變無窮然順理則吉逆理則凶則其所正而常者亦一理而已矣夫乾確然示人易矣夫坤隤然示人簡矣確然健貌隤然順貌所謂貞觀者也爻也者效此者也象也者像此者也此謂上文乾坤所示之理爻之竒耦卦之消息所以效而象之爻象動乎內吉凶見乎外功業見乎變聖人之情見乎辭內謂蓍卦之中外謂蓍卦之外變即動乎內之變辭即見乎外之辭天地之大德曰生聖人之大寶曰位何以守位曰人何以聚人曰財理財正辭禁民為非曰義曰人之人今本作仁吕氏從古蓋所謂非衆罔與守邦此第一章言卦爻吉凶造化功業古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之德以類萬物之情王昭素曰與地之間諸本多有天字俯仰逺近所取不一然不過以驗隂陽消息兩端而已神明之德如健順動止之性萬物之情如雷風山澤之象作結繩而為罔罟以佃以漁蓋取諸離兩目相承而物麗焉包犧氏沒神農氏作斫木為耜揉木為耒耒耨之利以教天下蓋取諸益二體皆木上入下動天下之益莫大乎此日中為市致天下之民聚天下之貨交易而退各得其所蓋取諸噬嗑日中為市上明而下動又借噬為市嗑為合也神農氏沒黃帝堯舜氏作通其變使民不倦神而化之使民宜之易窮則變變則通通則久是以自天祐之吉無不利黃帝堯舜垂衣裳而天下治蓋取諸乾坤乾坤變化而無為刳木為舟剡木為楫舟楫之利以濟不通致逺以利天下蓋取諸涣木在水上也致逺以利天下疑衍服牛乘馬引重致逺以利天下蓋取諸隨下動上説重門擊柝以待暴客蓋取諸豫豫備之意斷木為杵掘地為臼臼杵之利萬民以濟蓋取諸小過下止上動弦木為弧剡木為矢弧矢之利以威天下蓋取諸睽睽乖然後威以服之上古穴居而野處後世聖人易之以宫室上棟下宇以待風雨蓋取諸大壯壯固之意古之葬者厚衣之以薪葬之中野不封不樹喪期無數後世聖人易之以棺椁蓋取諸大過送死大事而過於厚上古結繩而治後世聖人易之以書契百官以治萬民以察蓋取諸夬明決之意人此第二章言聖制器尚象之事是故易者象也象也者像也易卦之刑理之似也彖者材也彖言一卦之材爻也者效天下之動者也效放也是故吉凶生而悔吝著也悔吝本微因此而著此第三章陽卦多隂隂卦多陽震坎艮為陽卦皆一陽二隂巽離兌為隂卦皆一隂二陽其故何也陽卦竒隂卦耦凡陽卦皆五畫凡隂卦皆四畫其德行何也陽一君而二民君子之道也隂二君而一民小人之道也君謂陽民謂隂此第四章易曰憧憧往來朋從爾思子曰天下何思何慮天下同歸而殊塗一致而百慮天下何思何慮引咸九四爻義而釋之言理本無二而殊塗百慮莫非自然何以思慮為哉必思而從則所從者亦狹矣日往則月來月往則日來日月相推而明生焉寒往則暑來暑往則寒來寒暑相推而嵗成焉往者屈也來者信也屈信相感而利生焉言往來屈信皆感應自然之常理加憧憧焉則入於私矣所以必思而後冇從也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇德也因言屈伸往來之理而又推以言學亦有自然之機也精研其義至於入神屈之至也然乃所以為出而致用之本利其施用無適不然伸之極也然乃所以為入而崇德之資內外交相養互相發也過此以往未之或知也窮神知化德之盛也下學之事盡力於精義利用而交養互發之機自不能已自是以上則亦無所用其力矣至於窮神知化乃德盛仁熟而自致耳然不知者往而屈也自致者來而信也是亦感應自然之理而已張子曰氣有隂陽推行冇漸為化合一不測為神此上四節皆以釋咸九四爻義易曰困于石據于蒺藜入于其宫不見其妻凶子曰非所困而困焉名必辱非所據而據焉身必危既辱且危死期將至妻其可得見邪釋困六三爻義易曰公用射隼于高墉之上獲之無不利子曰隼者禽也弓矢者器也射之者人也君子藏器於身待時而動何不利之有動而不括是以出而有獲語成器而動者也括結礙也此釋解上六爻義子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也此釋噬嗑𥘉九爻義善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解易曰何校滅耳凶此釋噬嗑上九爻義子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安而不忘危存而不忘亡治而不忘亂是以身安而國家可保也易曰其亡其亡繫于苞桑此釋否九五爻義子曰德薄而位尊知小而謀大力小而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也此釋鼎九四爻義子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微吉之先見者也君子見幾而作不俟終日易曰介于石不終日貞吉介如石焉寧用終日斷可識矣君子知微知彰知柔知剛萬夫之望此釋豫六二爻義漢書吉之之間有凶字子曰顔氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不逺復無祗悔元吉殆危也庶幾近意言近道也此釋復𥘉九爻義天地絪緼萬物化醇男女構精萬物化生易曰三人行則損一人一人行則得其友言致一也絪緼交密之狀醇謂厚而凝也言氣化者也化生形化者也此釋損六三爻義子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與也莫之與則傷之者至矣易曰莫益之或擊之立心勿恆凶此釋益上九爻義此第五章子曰乾坤其易之門邪乾陽物也坤隂物也隂陽合德而剛柔有體以體天地之撰以通神明之德諸卦剛柔之體皆以乾坤合德而成故曰乾坤易之門撰猶事也其稱名也雜而不越於稽其類其衰世之意邪萬物雖多無不出於隂陽之變故卦爻之義雖雜出而不差繆然非上古淳質之時思慮所及也故以為衰世之意蓋指文王與紂之時也夫易彰往而察來而微顯闡幽開而當名辨物正言斷辭則備矣而微顯恐當作微顯而開而之而亦疑有誤其稱名也小其取類也大其旨逺其辭文其言曲而中其事肆而隱因二以濟民行以明失得之報肆陳也二疑也盡此第六章多闕文疑不可通後皆放此易之興也其於中古乎作易者其有憂患乎夏商之末易道中微文王拘於羑里而繫彖辭易道復興是故履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之裕也困之辨也井德之地也巽德之制也履禮也上天下澤定分不易必謹乎此然後其德有以為基而立也謙者自卑而尊人又為禮者之所當執持而不可失者也九卦皆反身修德以處憂患之事也而有序焉基所以立柄所以持復者心不外而善端存恆者守不變而常且久懲忿窒欲以修身遷善改過以長善困以自驗其力井以不變其所然後能巽順於理以制事變也履和而至謙尊而光復小而辨於物恆雜而不厭損先難而後易益長裕而不設困窮而通井居其所而遷巽稱而隱此如書之九德禮非強世然事皆至極謙以自卑而尊且光復陽微而不亂於羣隂恆處雜而常德不厭損欲先難習熟則易益但充長而不造作困身困而道亨井不動而及物巽稱物之宜而潛隱不露履以和行謙以制禮復以自知恆以一德損以逺害益以興利困以寡怨井以辨義巽以行權寡怨謂少所怨尤辨義謂安而能慮此第七章三陳九卦以明處憂患之道易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適逺猶忘也周流六虛謂隂陽流行於卦之六位其出入以度外內使知懼此句未詳疑有脫誤又明於憂患與故無有師保如臨父母雖無師保而常若父母臨之戒懼之至初率其辭而揆其方既有典常茍非其人道不虛行方道也始由辭以度其理則見其有典常矣然神而明之則存乎其人也此第八章易之為書也原始要終以為質也六爻相雜唯其時物也質謂卦體卦必舉其始終而後成體爻則唯其時物而已其初難知其上易知本末也初辭擬之卒成之終此言初上二爻若夫雜物撰德辨是與非則非其中爻不備此謂卦中四爻噫亦要存亡吉凶則居可知矣知者觀其彖辭則思過半矣彖統論一卦六爻之體二與四同功而異位其善不同二多譽四多懼近也柔之為道不利逺者其要無咎其用柔中也此以下論中文同功謂皆隂位異位謂逺近不同四近君故多懼柔不利逺而二多譽者以其柔中也三與五同功而異位三多凶五多功貴賤之等也其柔危其剛勝邪三五同陽位而貴賤不同然以柔居之則危惟剛則能勝之此第九章易之為書也廣大悉備有天道焉有人道焉有地道焉兼三材而兩之故六六者非它也三材之道也三畫巳具三材重之故六而以上二爻為天中二爻為人下二爻為地道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉道有變動謂卦之一體等謂逺近貴賤之差相雜謂剛柔之位相間不當謂爻不當位此第十章易之興也其當殷之末世周之盛德邪當文王與紂之事邪是故其辭危危者使平易者使傾其道甚大百物不廢懼以終始其要無咎此之謂易之道也危懼故得平安慢易則必傾覆易之道也此第十一章夫乾天下之至健也德行恆易以知險夫坤天下之至順也德行恆簡以知阻至健則所行無難故易至順則所行不煩故之簡然其於事皆有以知其難而不敢易以處是以其有憂患則健者如自高臨下而知其險順者如自下趨上而知其阻蓋雖易而能知險則不陷於險矣既簡而又知阻則不困於阻矣所以能危能懼而無易者之傾也能説諸心能研諸侯之慮定天下之吉凶成天下之亹亹者侯之二字衍説諸心者心與理會乾之事也研諸慮者理因慮審坤之事也説諸心故有以定吉凶研諸慮故有以成亹亹是故變化云為吉事有祥象事知器占事知來變化云為故象事可以知器吉事有祥故占事可以知來天地設位聖人成能人謀鬼謀百姓與能天地設位而聖人作易以成其功於是人謀鬼謀雖百姓之愚昏得以與其能八卦以象告爻彖以情言剛柔雜居而吉凶可見矣象謂卦畫爻彖謂卦爻辭變動以利言吉凶以情遷是故愛惡相攻而吉凶生逺近相取而悔吝生情偽相感而利害生凡易之情近而不相得則凶或害之悔且吝不相得謂相惡也凶害悔吝皆由此生將叛者其辭慙中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭遊失其守者其辭屈卦爻之辭亦猶是也此第十二章原本周易本義卷八
