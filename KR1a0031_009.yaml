body:
  text: 原本周易本義卷九宋朱熹撰周易文言傳此篇申彖傳𧰼傳之意以盡乾坤二卦之藴而餘卦之說因可以例推云元者善之長也亨者嘉之㑹也利者義之和也貞者事之幹也元者生物之始天地之德莫先於此故於時為春於人則為仁而衆善之長也亨者生物之通物至於此莫不嘉美故於時為夏於人則為禮而衆美之㑹也利者生物之遂物各得宜不相妨害故於時為秋於人則為義而得其分之和貞者生物之成實理具備隨在各足故於時為冬於人則為知而為衆事之幹幹木之身枝葉所依以立者也君子體仁足以長人嘉㑹足以合禮利物足以和義貞固足以幹事以仁為體則無一物不在所愛之中故足以長人嘉其所㑹則無不合禮使物各得其利則我無不和貞固者知正之所在而固守之所謂知而弗去者也故足以為事之幹君子行此四德者故曰乾元亨利貞非君子之至健無以行此故曰乾元亨利貞異此第一節申彖傳之意與春秋傳所載穆姜之言不疑古者已有此言穆姜稱之而夫子亦有取焉故下文别以子曰表孔子之詞蓋傳者欲以明此章之為古語也初九曰潛龍勿用何謂也子曰龍德而隱者也不易乎世不成乎名遁世無悶不見是而無悶樂則行之憂則違之確乎其不可拔潛龍也龍德聖人之德也在下故隱易謂變其所守大扺乾卦六爻文言皆以聖人明之有隱顯而無淺深也九二曰見龍在田利見大人何謂也子曰龍德而正中者也庸言之信庸行之謹間邪存其誠善世而不伐德博而化易曰見龍在田利見大人君德也正中不潛而未躍之時也常言亦信常行亦謹盛德之至也間邪存其誠無斁亦保之意言君德也者釋大人之為九也二九三曰君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也知至至之可與幾也知終終之可與存義也是故居上位而不驕在下位而不憂故乾乾因其時而惕雖危無咎矣忠信主於心者無一念之不誠也修辭見於事者無一言之不實也雖有忠信之心然非修辭立誠則無以居之知至至之進德之事知終終之居業之事所以終日乾乾而夕猶惕若者以此故也可上可下不驕不憂所以無咎也九四曰或躍在淵無咎何謂也子曰上下無常非為邪也進退無恆非離羣也君子進德修業欲及時也故無咎內卦以德學言外卦以時位言進德修業九三備矣此則欲其及時而進也九五曰飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類也作起也物猶人也覩釋利見之意也本乎天者謂動物本乎地者謂植物物各從其類聖人人類之首也故興起於上則人皆見之上九曰亢龍有悔何謂也子曰貴而無位高而無民賢人在下位而無輔是以動而悔也賢人在下位謂九五以下無輔以上九過高志滿不來輔助之也此第二節申象傳之意潛龍勿用下也見龍在田時舍也言未為時用也終日乾乾行事也或躍在淵自試也未遽有為姑試其可飛龍在天上治也居上以治下亢龍有悔窮之災也乾元用九天下治也言乾元用九見與它卦不同君道剛而能柔天下無不治矣此第三節再申前意潛龍勿用陽氣潛藏見龍在田天下文明雖不在上位然天下巳𬒳其化終日乾乾與時偕行時當然也或躍在淵乾道乃革離下而上變革之時飛龍在天乃位乎天德天德即天位也蓋唯有是德乃宜居是位故以名之亢龍有悔與時偕極乾元用九乃見天則剛而能柔天之法也意此第四節又申前乾元者始而亨者也始則必亨理𫝑然矣利貞者性情也收斂歸藏乃見性情之實乾始能以美利利天下不言所利大矣哉始者元而亨也利天下者利也不言所利者貞也或曰坤利牝馬則言所利矣大哉乾乎剛健中正純粹精也剛以體言健兼用言中者其行無過不及正者其立不偏四者乾之德也純者不雜於隂柔粹者不雜於邪惡蓋剛健中正之至極而精者又純粹之至極也或疑乾剛無柔不得言中正者不然也天地之間本一氣之流行而有動靜耳以流行之統體而言則但謂之乾而無所不包矣以其動靜分之然後有隂陽剛柔之别也六爻發揮旁通情也旁通猶言曲盡時乘六龍以御天也雲行雨施天下平也言聖人時乘六龍以御天則如天之雲行雨施而天下平也此第五節復申首章之意君子以成德為行日可見之行也潛之為言也隱而未見行而未成是以君子勿用也成德已成之德也𥘉九固成德但其行未可見耳君子學以聚之問以辨之寬以居之仁以行之易曰見龍在田利見大人君德也蓋由四者以成大人之德再言君德以深明九二之為大人也九三重剛而不中上不在天下不在田故乾乾因其時而惕雖危無咎矣重剛謂陽爻陽位九四重剛而不中上不在天下不在田中不在人故或之或之者疑之也故無咎九四非重剛重字疑衍在人謂三或者隨時而未定也夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而况於人乎况於鬼神乎大人即釋爻辭所利見之大人也有是德而當其位乃可當之人與天地鬼神本無二理特蔽於有我之私是以梏於形體而不能相通大人無私以道為體曽何彼此先後之可言哉先天不違謂意之所為默與道契後天奉天謂知理如是奉而行之回紇謂郭子儀曰卜者謂此行當見一大人而還其占蓋與此合若子儀者雖未及乎夫子之所論然其至公無我亦可謂當時之大人矣亢之為言也知進而不知退知存而不知亡知得而不知喪所以動而有悔也其唯聖人乎知進退存亡而不失其正者其唯聖人乎知其理𫝑如是而處之以道則不至於有悔矣固非計私以避害者也再言其唯聖人乎始若設問而卒自應之也此第六節復申第二第三第四節之意坤至柔而動者也剛至靜而德方剛方釋牝馬之貞也方謂生物有常後得主而有常桯傳曰主下當有利字含萬物而化光復明亨義坤道其順乎承天而時行復明順承天之義以上申彖傳之意此積善之家必有餘慶積不善之家必有餘殃臣弒其君子弒其父非一朝一夕之故其所由來者漸矣由辨之不早辨也易曰履霜堅氷至蓋言順也古字順慎通用按此當作慎言當辨之於微也直其正也方其義也君子敬以直內義以方外敬義立而德不孤直方大不習無不利則不疑其所行也此以學言之也正謂本體義謂裁制敬則本體之守也直內方外程傳備矣不孤言大也疑故習而後利不疑則何假於習隂雖有美含之以從王事弗敢成也地道也妻道也臣道也地道無成而代有終也天地變化草木蕃天地閉賢人隱易曰括囊無咎無譽蓋言謹也君子黃中通理黃中言中德在內釋黃字之義也正位居體雖在尊位而居下體釋裳字之義也美在其中而暢於四支發於事業美之至也美在其中復釋黃中暢於四支復釋居體隂疑於陽必戰為其嫌於無陽也故稱龍焉猶未離其類也故稱血焉夫𤣥黃者天地之雜也天𤣥而地黃疑謂鈞敵無小大之差也坤雖無陽然陽未嘗無也血隂屬蓋氣陽而血隂也𤣥黃天地之正色言隂陽皆傷也此以上申𧰼傳之意原本周易本義卷九
